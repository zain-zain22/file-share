<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickShare - മൊബൈൽ</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #efeae2; /* വാട്സാപ്പ് ബാക്ക്ഗ്രൗണ്ട് */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        .chat-container {
            width: 100%;
            max-width: 450px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            background-color: #008069;
            color: white;
            padding: 16px;
            text-align: center;
        }

        .chat-header h2 {
            font-size: 20px;
            margin-bottom: 4px;
        }

        /* കണക്ട് ബട്ടൺ സ്റ്റൈൽ */
        .connect-area {
            background: #f0f2f5;
            padding: 15px;
            border-bottom: 1px solid #e1e1e1;
            text-align: center;
        }

        .connect-btn {
            background-color: #00a884;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            width: 100%;
            transition: 0.2s;
        }

        .connect-btn:hover {
            background-color: #008069;
        }

        /* ചാറ്റ് വിൻഡോ */
        .chat-body {
            padding: 20px;
            min-height: 250px;
            max-height: 350px;
            overflow-y: auto;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .status-bubble {
            align-self: center;
            background: rgba(225, 245, 254, 0.9);
            color: #1e3a47;
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 13px;
            text-align: center;
            max-width: 90%;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .download-link {
            display: inline-block;
            margin-top: 5px;
            color: #008069;
            font-weight: bold;
            text-decoration: none;
            background: white;
            padding: 5px 10px;
            border-radius: 5px;
            border: 1px solid #008069;
        }

        .chat-footer {
            background: #f0f2f5;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .file-label {
            background: #e1e1e1;
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
        }

        .chat-footer input[type="file"] {
            display: none;
        }

        .send-btn {
            flex: 1;
            background-color: #008069;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
        }

        .send-btn:disabled {
            background-color: #b3d7d1;
            cursor: not-allowed;
        }

        .file-name-display {
            font-size: 12px;
            color: #555;
            padding: 0 15px 5px 15px;
            background: #f0f2f5;
            text-align: left;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <h2>📱 മൊബൈൽ വിൻഡോ</h2>
    </div>

    <div class="connect-area">
        <button class="connect-btn" id="connect-btn" onclick="connectToLaptop()">💻 ലാപ്ടോപ്പിലേക്ക് കണക്ട് ചെയ്യുക</button>
    </div>

    <div class="chat-body" id="chat-body">
        <div class="status-bubble" id="main-status">ലിങ്ക് ചെയ്തിട്ടില്ല. മുകളിലെ ബട്ടൺ അമർത്തുക.</div>
    </div>

    <div class="file-name-display" id="file-name" style="display: none;"></div>

    <div class="chat-footer">
        <label for="file-input" class="file-label" title="ഫയൽ തിരഞ്ഞെടുക്കുക">📎</label>
        <input type="file" id="file-input" onchange="displayFileName()" disabled>
        <button id="send-btn" class="send-btn" onclick="sendFile()" disabled>ഫയൽ അയക്കുക</button>
    </div>
</div>

<script>
    // മൊബൈലിന് വേണ്ടി മറ്റൊരു ഐഡി നൽകുന്നു (ലാപ്ടോപ്പിന്റേത് 'my-laptop-pc' ആണ്)
    const peer = new Peer('my-mobile-phone'); 
    let conn;
    
    const chatBody = document.getElementById('chat-body');
    const fileInput = document.getElementById('file-input');
    const sendBtn = document.getElementById('send-btn');
    const nameDisplay = document.getElementById('file-name');

    function showStatus(message, isLink = false, linkElem = null) {
        const bubble = document.createElement('div');
        bubble.className = 'status-bubble';
        bubble.innerText = message;
        if(isLink && linkElem) {
            bubble.appendChild(document.createElement('br'));
            bubble.appendChild(linkElem);
        }
        chatBody.appendChild(bubble);
        chatBody.scrollTop = chatBody.scrollHeight;
    }

    // ലാപ്ടോപ്പിലേക്ക് നേരിട്ട് കണക്ട് ചെയ്യുന്ന ഫങ്ക്ഷൻ
    function connectToLaptop() {
        document.getElementById('main-status').innerText = "കണക്ട് ചെയ്യാൻ ശ്രമിക്കുന്നു...";
        
        // ലാപ്ടോപ്പിന്റെ ഫിക്സഡ് ഐഡി ആയ 'my-laptop-pc' ലേക്ക് കണക്ട് ചെയ്യുന്നു
        conn = peer.connect('my-laptop-pc'); 
        
        conn.on('open', () => {
            document.getElementById('main-status').style.display = 'none';
            document.getElementById('connect-btn').innerText = "🤝 കണക്ട് ആയിരിക്കുന്നു";
            document.getElementById('connect-btn').disabled = true;
            document.getElementById('connect-btn').style.backgroundColor = "#7f8c8d";
            
            showStatus("🤝 ലാപ്ടോപ്പുമായി കണക്ട് ആയി! ഇനി ഫയലുകൾ അയക്കാം.");
            fileInput.disabled = false;
            sendBtn.disabled = false;
        });

        conn.on('data', (data) => {
            if (data.file) {
                const blob = new Blob([data.file], { type: data.fileType });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = data.fileName;
                link.className = 'download-link';
                link.innerText = "⬇️ ഡൗൺലോഡ്";
                
                showStatus(`📩 ഫയൽ ലഭിച്ചു: ${data.fileName}`, true, link);
            }
        });

        // കണക്ഷൻ തകരാറിലായാൽ
        conn.on('error', (err) => {
            alert("കണക്ഷൻ പരാജയപ്പെട്ടു! ലാപ്ടോപ്പിൽ ആപ്പ് ഓപ്പൺ ആണെന്ന് ഉറപ്പാക്കുക.");
            document.getElementById('main-status').innerText = "കണക്ഷൻ പരാജയപ്പെട്ടു. വീണ്ടും ശ്രമിക്കുക.";
        });
    }

    function displayFileName() {
        if(fileInput.files.length > 0) {
            nameDisplay.innerText = "സെലക്ട് ചെയ്ത ഫയൽ: " + fileInput.files[0].name;
            nameDisplay.style.display = "block";
        }
    }

    function sendFile() {
        const file = fileInput.files[0];
        if (file && conn) {
            showStatus(`📤 ഫയൽ അയക്കുന്നു: ${file.name}...`);
            conn.send({
                file: file,
                fileName: file.name,
                fileType: file.type
            });
            showStatus("✅ വിജയകരമായി അയച്ചു!");
            
            nameDisplay.style.display = "none";
            fileInput.value = '';
        }
    }
</script>
</body>
</html>
